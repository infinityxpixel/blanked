<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Against Humanity</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #171717; }
        .card-shadow { shadow-offset: 0px 10px; shadow-radius: 20px; shadow-color: rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Inline SVG Icons as Lucide script might need helper
        const Trophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const Play = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const RotateCcw = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const CheckCircle2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>;

        const CARDS_DATABASE = {
            blackCards: [
                { text: "What's that smell?", pick: 1 },
                { text: "I drink to forget _.", pick: 1 },
                { text: "That's how I want to die: _.", pick: 1 },
                { text: "What's the next Happy Meal toy?", pick: 1 },
                { text: "What's my secret superpower?", pick: 1 },
                { text: "Why am I sticky?", pick: 1 },
                { text: "I'm not like other girls. I _.", pick: 1 },
                { text: "What gives me uncontrollable gas?", pick: 1 },
                { text: "I got 99 problems but _ ain't one.", pick: 1 },
                { text: "Maybe she's born with it. Maybe it's _.", pick: 1 },
                { text: "What is Batman's guilty pleasure?", pick: 1 },
                { text: "Why am I so broke?", pick: 1 }
            ],
            whiteCards: [
                "A bit of slap and tickle.", "Active listening.", "An oversized lollipop.", "Dying.", "Eating all of the cookies.", "Friendly fire.", "Grandma.", "Hormone injections.", "My soul.", "Natural selection.", "Old-people smell.", "Poor life choices.", "Puberty.", "The Pope.", "Waiting till marriage.", "Florida Man.", "Student loans.", "Existential dread.", "Taco Bell.", "A tiny horse.", "Tax fraud.", "Gluten-free bread.", "A weirdly specific fetish.", "Meme culture.", "The truth.", "A lie."
            ]
        };

        const MAX_ROUNDS = 5; // Shortened for demo, change to 10 for full game

        const App = () => {
            const [gameState, setGameState] = useState('setup');
            const [players, setPlayers] = useState([
                { id: 1, name: 'Player 1', score: 0, hand: [] },
                { id: 2, name: 'Player 2', score: 0, hand: [] }
            ]);
            const [roundNumber, setRoundNumber] = useState(1);
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [roundBlackCard, setRoundBlackCard] = useState(null);
            const [allSubmissions, setAllSubmissions] = useState([]);
            const [selectedWhiteCard, setSelectedWhiteCard] = useState(null);
            const [deck, setDeck] = useState({ black: [], white: [] });

            const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

            const startGame = () => {
                const whiteDeck = shuffle(CARDS_DATABASE.whiteCards);
                const blackDeck = shuffle(CARDS_DATABASE.blackCards);
                const initialPlayers = players.map((p, idx) => ({
                    ...p, score: 0, hand: whiteDeck.slice(idx * 10, (idx * 10) + 10) 
                }));
                setDeck({ white: whiteDeck.slice(20), black: blackDeck.slice(1) });
                setPlayers(initialPlayers);
                setRoundBlackCard(blackDeck[0]);
                setRoundNumber(1);
                setCurrentPlayerIdx(0);
                setAllSubmissions([]);
                setGameState('play');
            };

            const submitResponse = () => {
                const newSub = {
                    playerIdx: currentPlayerIdx,
                    playerName: players[currentPlayerIdx].name,
                    blackCard: roundBlackCard,
                    whiteCard: selectedWhiteCard,
                    voted: false
                };
                const newAllSubmissions = [...allSubmissions, newSub];
                const updatedPlayers = players.map((p, idx) => idx === currentPlayerIdx ? { ...p, hand: p.hand.filter(c => c !== selectedWhiteCard) } : p);
                
                setPlayers(updatedPlayers);
                setSelectedWhiteCard(null);

                if (currentPlayerIdx === 0) {
                    setCurrentPlayerIdx(1);
                } else {
                    if (roundNumber < MAX_ROUNDS) {
                        setRoundNumber(roundNumber + 1);
                        setCurrentPlayerIdx(0);
                        setRoundBlackCard(deck.black[0]);
                        setDeck({ ...deck, black: deck.black.slice(1) });
                    } else {
                        setGameState('judging');
                    }
                }
                setAllSubmissions(newAllSubmissions);
            };

            const voteForSubmission = (idx) => {
                const updatedPlayers = [...players];
                updatedPlayers[allSubmissions[idx].playerIdx].score += 1;
                setPlayers(updatedPlayers);
                const updatedSubs = allSubmissions.map((s, i) => i === idx ? { ...s, voted: true } : s);
                setAllSubmissions(updatedSubs);
                if (updatedSubs.every(s => s.voted)) setGameState('winner');
            };

            if (gameState === 'setup') return (
                <div className="min-h-screen text-white flex flex-col items-center justify-center p-6">
                    <div className="max-w-md w-full text-center space-y-8">
                        <h1 className="text-6xl font-black tracking-tighter uppercase italic">APP</h1>
                        <div className="bg-neutral-800 p-8 rounded-3xl border border-neutral-700 shadow-2xl space-y-6">
                            {players.map((p, i) => (
                                <input key={p.id} className="w-full bg-neutral-900 border border-neutral-700 rounded-xl px-4 py-3 font-bold text-white outline-none focus:ring-2 focus:ring-white" value={p.name} onChange={(e) => {
                                    const n = [...players]; n[i].name = e.target.value; setPlayers(n);
                                }} />
                            ))}
                            <button onClick={startGame} className="w-full bg-white text-black py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2">START <Play /></button>
                        </div>
                    </div>
                </div>
            );

            if (gameState === 'play') return (
                <div className="min-h-screen text-white flex flex-col">
                    <header className="p-4 border-b border-neutral-800 flex justify-between bg-neutral-900/80 sticky top-0 z-50">
                        <div className="font-black">AAH</div>
                        <div className="text-xs font-black uppercase tracking-widest text-neutral-400">ROUND {roundNumber} - <span className="text-white">{players[currentPlayerIdx].name}</span></div>
                    </header>
                    <main className="p-6 max-w-4xl mx-auto w-full flex flex-col items-center gap-8">
                        <div className="w-64 h-80 bg-black border-2 border-neutral-800 rounded-2xl p-6 flex flex-col justify-between shadow-2xl">
                            <p className="text-xl font-bold leading-tight" dangerouslySetInnerHTML={{ __html: roundBlackCard?.text.replace(/_/g, '<span class="border-b-2 border-white px-4"></span>') }} />
                            <span className="text-[10px] font-black opacity-20">APP AGAINST HUMANITY</span>
                        </div>
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-24">
                            {players[currentPlayerIdx].hand.map((card, i) => (
                                <button key={i} onClick={() => setSelectedWhiteCard(card)} className={`aspect-[3/4] bg-white text-black p-4 text-left font-bold text-sm rounded-xl transition-all ${selectedWhiteCard === card ? 'ring-4 ring-blue-500 scale-105' : 'opacity-90'}`}>{card}</button>
                            ))}
                        </div>
                    </main>
                    <div className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-neutral-900 flex justify-center">
                        <button disabled={!selectedWhiteCard} onClick={submitResponse} className="w-full max-w-xs py-4 bg-white text-black font-black rounded-2xl disabled:opacity-50 uppercase">Confirm Choice</button>
                    </div>
                </div>
            );

            if (gameState === 'judging') return (
                <div className="min-h-screen text-white p-6 max-w-xl mx-auto space-y-8">
                    <h2 className="text-3xl font-black text-center italic">JUDGING</h2>
                    {allSubmissions.map((sub, i) => (
                        <div key={i} className={`p-8 bg-neutral-800 border-2 rounded-3xl ${sub.voted ? 'opacity-30 border-green-500' : 'border-neutral-700'}`}>
                            <p className="text-xl font-bold mb-6" dangerouslySetInnerHTML={{ __html: sub.blackCard.text.replace(/_/g, `<span class="bg-white text-black px-2 rounded mx-1">${sub.whiteCard}</span>`) }} />
                            {!sub.voted && <button onClick={() => voteForSubmission(i)} className="w-full py-3 bg-white text-black font-black rounded-xl uppercase">Vote</button>}
                        </div>
                    ))}
                </div>
            );

            if (gameState === 'winner') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-6">
                    <Trophy />
                    <h1 className="text-6xl font-black uppercase italic">Game Over</h1>
                    <div className="flex gap-12">
                        {players.map(p => <div key={p.id}><div className="text-xs text-neutral-500 uppercase">{p.name}</div><div className="text-5xl font-black">{p.score}</div></div>)}
                    </div>
                    <button onClick={() => setGameState('setup')} className="bg-white text-black px-12 py-4 rounded-2xl font-black flex items-center gap-2">REMATCH <RotateCcw /></button>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
