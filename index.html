<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>App Against Humanity</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #171717; 
            margin: 0;
            padding: 0;
            color: white;
        }
        .black-card {
            background-color: #000;
            border: 2px solid #262626;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .white-card {
            background-color: #fff;
            color: #000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Custom SVG Icons
        const Trophy = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-500"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const Play = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const RotateCcw = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );

        const CARDS_DATABASE = {
            blackCards: [
                { text: "What's that smell?", pick: 1 },
                { text: "I drink to forget _.", pick: 1 },
                { text: "That's how I want to die: _.", pick: 1 },
                { text: "What's my secret superpower?", pick: 1 },
                { text: "Why am I sticky?", pick: 1 },
                { text: "Maybe she's born with it. Maybe it's _.", pick: 1 },
                { text: "I got 99 problems but _ ain't one.", pick: 1 },
                { text: "What is Batman's guilty pleasure?", pick: 1 },
                { text: "Why am I so broke?", pick: 1 },
                { text: "What gives me uncontrollable gas?", pick: 1 },
                { text: "What's the next Happy Meal toy?", pick: 1 },
                { text: "Science will never explain _.", pick: 1 }
            ],
            whiteCards: [
                "A bit of slap and tickle.", "Active listening.", "An oversized lollipop.", "Dying.", "Eating all of the cookies.", "Friendly fire.", "Grandma.", "Hormone injections.", "My soul.", "Natural selection.", "Old-people smell.", "Poor life choices.", "Puberty.", "The Pope.", "Waiting till marriage.", "Florida Man.", "Student loans.", "Existential dread.", "Taco Bell.", "A tiny horse.", "Tax fraud.", "Gluten-free bread.", "Meme culture.", "The truth.", "A lie.", "Actually taking candy from a baby.", "A middle-aged man on a roller coaster."
            ]
        };

        const MAX_ROUNDS = 10;

        const App = () => {
            const [gameState, setGameState] = useState('setup');
            const [players, setPlayers] = useState([
                { id: 1, name: 'Player 1', score: 0, hand: [] },
                { id: 2, name: 'Player 2', score: 0, hand: [] }
            ]);
            const [roundNumber, setRoundNumber] = useState(1);
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [roundBlackCard, setRoundBlackCard] = useState(null);
            const [allSubmissions, setAllSubmissions] = useState([]);
            const [selectedWhiteCard, setSelectedWhiteCard] = useState(null);
            const [deck, setDeck] = useState({ black: [], white: [] });

            const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

            const startGame = () => {
                const whiteDeck = shuffle(CARDS_DATABASE.whiteCards);
                const blackDeck = shuffle(CARDS_DATABASE.blackCards);
                const initialPlayers = players.map((p, idx) => ({
                    ...p, 
                    score: 0, 
                    hand: whiteDeck.slice(idx * 12, (idx * 12) + 12) 
                }));
                setDeck({ white: whiteDeck.slice(24), black: blackDeck.slice(1) });
                setPlayers(initialPlayers);
                setRoundBlackCard(blackDeck[0]);
                setRoundNumber(1);
                setCurrentPlayerIdx(0);
                setAllSubmissions([]);
                setGameState('play');
            };

            const submitResponse = () => {
                const newSub = {
                    playerIdx: currentPlayerIdx,
                    playerName: players[currentPlayerIdx].name,
                    blackCard: roundBlackCard,
                    whiteCard: selectedWhiteCard,
                    voted: false
                };
                const newAllSubmissions = [...allSubmissions, newSub];
                const updatedPlayers = players.map((p, idx) => 
                    idx === currentPlayerIdx ? { ...p, hand: p.hand.filter(c => c !== selectedWhiteCard) } : p
                );
                
                setPlayers(updatedPlayers);
                setSelectedWhiteCard(null);

                if (currentPlayerIdx === 0) {
                    setCurrentPlayerIdx(1);
                } else {
                    if (roundNumber < MAX_ROUNDS) {
                        setRoundNumber(prev => prev + 1);
                        setCurrentPlayerIdx(0);
                        setRoundBlackCard(deck.black[0]);
                        setDeck(prev => ({ ...prev, black: prev.black.slice(1) }));
                    } else {
                        setGameState('judging');
                    }
                }
                setAllSubmissions(newAllSubmissions);
            };

            const voteForSubmission = (idx) => {
                const updatedPlayers = [...players];
                updatedPlayers[allSubmissions[idx].playerIdx].score += 1;
                setPlayers(updatedPlayers);
                const updatedSubs = allSubmissions.map((s, i) => i === idx ? { ...s, voted: true } : s);
                setAllSubmissions(updatedSubs);
                if (updatedSubs.every(s => s.voted)) setGameState('winner');
            };

            if (gameState === 'setup') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <div className="max-w-md w-full text-center space-y-8">
                        <div className="space-y-2">
                            <h1 className="text-7xl font-black tracking-tighter uppercase italic text-white">APP</h1>
                            <p className="text-neutral-500 font-bold uppercase tracking-widest text-xs">Against Humanity</p>
                        </div>
                        <div className="bg-neutral-800 p-8 rounded-3xl border border-neutral-700 shadow-2xl space-y-4">
                            {players.map((p, i) => (
                                <div key={p.id} className="text-left">
                                    <label className="text-[10px] font-black text-neutral-500 uppercase ml-2">Player {i+1}</label>
                                    <input 
                                        className="w-full bg-neutral-900 border border-neutral-700 rounded-xl px-4 py-3 font-bold text-white outline-none focus:ring-2 focus:ring-white transition-all mt-1" 
                                        value={p.name} 
                                        onChange={(e) => {
                                            const n = [...players]; n[i].name = e.target.value; setPlayers(n);
                                        }} 
                                    />
                                </div>
                            ))}
                            <button onClick={startGame} className="w-full bg-white text-black py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 hover:bg-neutral-200 active:scale-95 transition-all mt-4 uppercase">
                                Start Game <Play />
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (gameState === 'play') return (
                <div className="min-h-screen flex flex-col">
                    <header className="p-4 border-b border-neutral-800 flex justify-between bg-neutral-900/80 sticky top-0 z-50 backdrop-blur-md">
                        <div className="font-black text-xl tracking-tighter italic">AAH</div>
                        <div className="text-xs font-black uppercase tracking-widest text-neutral-400 self-center">
                            ROUND {roundNumber} / {MAX_ROUNDS} • <span className="text-white">{players[currentPlayerIdx].name}'s Turn</span>
                        </div>
                    </header>
                    <main className="p-6 max-w-5xl mx-auto w-full flex flex-col items-center gap-10 pb-32">
                        <div className="black-card w-64 h-80 rounded-2xl p-6 flex flex-col justify-between">
                            <p className="text-xl font-bold leading-tight" dangerouslySetInnerHTML={{ __html: roundBlackCard?.text.replace(/_/g, '<span class="border-b-2 border-white px-5 mx-1"></span>') }} />
                            <span className="text-[10px] font-black opacity-20 uppercase tracking-widest">App Against Humanity</span>
                        </div>
                        
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full">
                            {players[currentPlayerIdx].hand.map((card, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => setSelectedWhiteCard(card)} 
                                    className={`white-card aspect-[3/4] p-4 text-left font-bold text-sm rounded-xl transition-all flex flex-col justify-between hover:-translate-y-1 active:scale-95 ${selectedWhiteCard === card ? 'ring-4 ring-blue-500 scale-105 z-10' : 'opacity-95'}`}
                                >
                                    <span>{card}</span>
                                    <span className="text-[8px] font-black opacity-20 uppercase">AAH</span>
                                </button>
                            ))}
                        </div>
                    </main>
                    <div className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-neutral-900 via-neutral-900/80 flex justify-center z-50">
                        <button 
                            disabled={!selectedWhiteCard} 
                            onClick={submitResponse} 
                            className="w-full max-w-xs py-4 bg-white text-black font-black rounded-2xl disabled:opacity-30 uppercase shadow-2xl hover:bg-neutral-200 active:scale-95 transition-all"
                        >
                            {selectedWhiteCard ? 'Submit Card' : 'Pick a Card'}
                        </button>
                    </div>
                </div>
            );

            if (gameState === 'judging') return (
                <div className="min-h-screen p-6 max-w-2xl mx-auto space-y-12 pb-32">
                    <div className="text-center space-y-2 pt-8">
                        <h2 className="text-4xl font-black italic tracking-tighter uppercase">The Verdict</h2>
                        <p className="text-neutral-500 font-bold uppercase text-[10px] tracking-widest">Vote for the funniest pairings</p>
                    </div>
                    {allSubmissions.map((sub, i) => (
                        <div key={i} className={`p-8 bg-neutral-800 border-2 rounded-3xl transition-all shadow-xl ${sub.voted ? 'opacity-40 grayscale border-green-500/50' : 'border-neutral-700'}`}>
                            <div className="text-[10px] font-black text-neutral-500 uppercase mb-4 tracking-widest">Round {Math.floor(i/2) + 1} • {sub.playerName}'s Choice</div>
                            <p className="text-2xl font-bold mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: sub.blackCard.text.replace(/_/g, `<span class="bg-white text-black px-2 py-0.5 rounded-lg mx-1 shadow-lg">${sub.whiteCard}</span>`) }} />
                            {!sub.voted && (
                                <button onClick={() => voteForSubmission(i)} className="w-full py-4 bg-white text-black font-black rounded-2xl hover:bg-neutral-200 transition-all uppercase tracking-tighter">
                                    Vote as Funniest
                                </button>
                            )}
                        </div>
                    ))}
                </div>
            );

            if (gameState === 'winner') {
                const winner = players[0].score >= players[1].score ? players[0] : players[1];
                const isTie = players[0].score === players[1].score;
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-10">
                        <div className="animate-bounce">
                            <Trophy />
                        </div>
                        <div className="space-y-2">
                            <h1 className="text-6xl font-black uppercase italic tracking-tighter">{isTie ? "It's a Draw" : `${winner.name} Wins!`}</h1>
                            <p className="text-neutral-500 font-bold uppercase tracking-[0.4em] text-xs">Humanity has been defeated</p>
                        </div>
                        <div className="flex gap-16">
                            {players.map(p => (
                                <div key={p.id} className="space-y-1">
                                    <div className="text-[10px] text-neutral-500 font-black uppercase tracking-widest">{p.name}</div>
                                    <div className="text-6xl font-black">{p.score}</div>
                                    <div className="text-[10px] text-neutral-600 font-bold uppercase">Points</div>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => setGameState('setup')} className="bg-white text-black px-12 py-5 rounded-3xl font-black text-xl flex items-center gap-3 hover:bg-neutral-200 transition-all active:scale-95 shadow-2xl uppercase tracking-tighter">
                            Rematch <RotateCcw />
                        </button>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
