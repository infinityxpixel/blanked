<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blanked — Fill the Void</title>
    <!-- Custom Favicon for Blanked -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><rect x='20' y='45' width='60' height='10' fill='white'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .blanked-black-card { 
            background-color: #000; 
            border: 1px solid #333; 
            width: 100%;
            max-width: 18rem; 
            aspect-ratio: 3/4;
            height: auto;
            position: relative;
            overflow: hidden;
        }

        /* Subtle noise texture for cards */
        .blanked-black-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.05;
            pointer-events: none;
        }
        
        .blanked-white-card { 
            background-color: #fff; 
            color: #000; 
            min-height: 8rem; 
            cursor: pointer; 
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease; 
            border: 1px solid #e5e5e5;
        }

        @media (min-width: 768px) {
            .blanked-white-card { min-height: 12rem; }
        }

        .animate-reveal { animation: reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes reveal { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
        
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }

        .logo-font {
            letter-spacing: -0.05em;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- UI Icons ---
        const TrophyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
        );

        const ArrowIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
        );

        const CARDS_DATABASE = {
            blackCards: [
                { text: "The next big Silicon Valley startup is basically just _.", pick: 1 },
                { text: "What's that smell?", pick: 1 },
                { text: "I drink to forget _.", pick: 1 },
                { text: "My secret superpower is _.", pick: 1 },
                { text: "Wait, if you're here, then who's _?", pick: 1 },
                { text: "I got 99 problems but _ ain't one.", pick: 1 },
                { text: "What is Batman's guilty pleasure?", pick: 1 },
                { text: "Step 1: _. Step 2: _. Step 3: Profit.", pick: 1 },
                { text: "TSA guidelines now prohibit _ on airplanes.", pick: 1 },
                { text: "Maybe she's born with it. Maybe it's _.", pick: 1 },
                { text: "War! What is it good for?", pick: 1 },
                { text: "Next from J.K. Rowling: Harry Potter and the Chamber of _.", pick: 1 },
                { text: "A romantic, candlelit dinner would be incomplete without _.", pick: 1 },
                { text: "What helps me relax after a long day?", pick: 1 },
                { text: "What's the gift that keeps on giving?", pick: 1 },
                { text: "I'm not like the other girls. I'm _.", pick: 1 },
                { text: "Why am I sticky?", pick: 1 },
                { text: "What's in the box?", pick: 1 },
                { text: "What does the Fox say?", pick: 1 },
                { text: "What's there a lot of in heaven?", pick: 1 }
            ],
            whiteCards: [
                "The existential dread of being alive.", "Aggressive meditation.", "A lukewarm Hot Pocket.", "The scent of a new MacBook.", "Cancel culture.", "Avocado toast.", "A surprisingly high credit score.", "Ghosting your therapist.", "The premium version of nothing.", "Infinite scrolling.", "A mid-life crisis at age 22.", "Being 'that' guy.", "Passive-aggressive Slack messages.", "The simulation glitches.", "Cryptocurrency regrets.", "Danny DeVito's left eyebrow.", "An honest-to-God miracle.", "Hot cheese.", "The social contract.", "Actually getting 8 hours of sleep.", "Vigorous jazz hands.", "A bag of magic beans.", "Sexting your boss by accident.", "The moist, flapping wings of a thousand bats.", "Drinking alone in a dimly lit room.", "Accepting the inevitable.", "A slightly charred bagel.", "Instructions unclear, stuck in toaster.", "Public speaking naked.", "Kanye West's ego.", "A web of lies.", "Committing to the bit.", "The miracle of birth.", "Small talk.", "A slowly peeling sunburn.", "The Big Bang.", "An unwanted group chat.", "Poor life choices.", "Grandma's secret stash.", "A super-massive black hole.", "Farting in a crowded elevator.", "Mecha-Hitler.", "Object permanence.", "The Uber driver's personal problems.", "Two midgets shitting in a bucket.", "A low-speed chase.", "The scent of fear.", "A box of kittens.", "Science.", "A PowerPoint presentation about nothing.", "A balanced breakfast.", "The French.", "Explaining the joke.", "The feeling of wet socks.", "Adult friendship.", "A lifetime of sadness.", "The American Dream.", "Emotional baggage.", "Civilian casualties.", "The Rapture.", "Historical revisionism.", "A basic white girl.", "The inevitable heat death of the universe.", "Capitalism.", "A sense of accomplishment.", "A bag of frozen peas.", "A long-winded story about nothing.", "The sound of one hand clapping.", "A lukewarm bath.", "The sheer audacity of this bitch."
            ]
        };

        const MAX_ROUNDS = 5;

        const App = () => {
            const [gameState, setGameState] = useState('auth');
            const [authInput, setAuthInput] = useState({ username: '', password: '' });
            const [players, setPlayers] = useState([
                { id: 1, name: 'Player 1', score: 0, hand: [] },
                { id: 2, name: 'Player 2', score: 0, hand: [] }
            ]);
            const [roundNumber, setRoundNumber] = useState(1);
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [roundBlackCard, setRoundBlackCard] = useState(null);
            const [allSubmissions, setAllSubmissions] = useState([]);
            const [selectedWhiteCard, setSelectedWhiteCard] = useState(null);
            const [deck, setDeck] = useState({ black: [], white: [] });
            const [votingRoundIndex, setVotingRoundIndex] = useState(1);

            const renderCardContent = (blackText, whiteText) => {
                if (!whiteText) return blackText;
                const formattedWhite = `<span class="bg-white text-black px-2 py-0.5 rounded-md mx-1 font-bold underline decoration-2">${whiteText}</span>`;
                if (blackText.includes('_')) {
                    return blackText.replace('_', formattedWhite);
                }
                return `${blackText} ${formattedWhite}`;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                // Simple hardcoded key check (same as original logic)
                const key = "cmVlc2hvZg==";
                if (btoa(authInput.username) === key && btoa(authInput.password) === key) {
                    setGameState('setup');
                }
            };

            const startGame = () => {
                const whiteDeck = [...CARDS_DATABASE.whiteCards].sort(() => Math.random() - 0.5);
                const blackDeck = [...CARDS_DATABASE.blackCards].sort(() => Math.random() - 0.5);
                
                setPlayers(players.map((p, idx) => ({
                    ...p, score: 0, hand: whiteDeck.slice(idx * 10, (idx * 10) + 10) 
                })));
                setDeck({ white: whiteDeck.slice(20), black: blackDeck.slice(0, MAX_ROUNDS) });
                setRoundBlackCard(blackDeck[0]);
                setRoundNumber(1);
                setCurrentPlayerIdx(0);
                setAllSubmissions([]);
                setVotingRoundIndex(1);
                setGameState('play');
            };

            const submitResponse = () => {
                const newSub = {
                    id: `r${roundNumber}-p${currentPlayerIdx}-${Date.now()}`,
                    playerIdx: currentPlayerIdx,
                    playerName: players[currentPlayerIdx].name,
                    blackCard: { ...roundBlackCard },
                    whiteCard: selectedWhiteCard,
                    round: roundNumber,
                    winner: false
                };
                
                setAllSubmissions(prev => [...prev, newSub]);
                setPlayers(players.map((p, idx) => 
                    idx === currentPlayerIdx ? { ...p, hand: p.hand.filter(c => c !== selectedWhiteCard) } : p
                ));
                setSelectedWhiteCard(null);

                if (currentPlayerIdx === 0) {
                    setCurrentPlayerIdx(1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (roundNumber < MAX_ROUNDS) {
                    const next = roundNumber + 1;
                    setRoundNumber(next);
                    setCurrentPlayerIdx(0);
                    setRoundBlackCard(deck.black[next - 1]);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setGameState('judging');
                }
            };

            const voteForSubmission = (id) => {
                const updatedSubmissions = allSubmissions.map(s => s.id === id ? { ...s, winner: true } : s);
                setAllSubmissions(updatedSubmissions);
                
                const winnerSub = updatedSubmissions.find(s => s.id === id);
                setPlayers(ps => ps.map((p, i) => i === winnerSub.playerIdx ? { ...p, score: p.score + 1 } : p));

                if (votingRoundIndex < MAX_ROUNDS) {
                    setVotingRoundIndex(v => v + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setGameState('winner');
                }
            };

            const currentVotingGroup = useMemo(() => 
                allSubmissions.filter(s => s.round === votingRoundIndex), 
            [allSubmissions, votingRoundIndex]);

            // --- Game Views ---

            if (gameState === 'auth') return (
                <div className="min-h-screen flex items-center justify-center bg-black p-6">
                    <form onSubmit={handleLogin} className="w-full max-w-sm text-center animate-reveal">
                        <div className="mb-12">
                            <h1 className="logo-font text-6xl tracking-tighter uppercase mb-2">Blanked</h1>
                            <p className="text-neutral-500 font-bold uppercase text-[10px] tracking-[0.4em]">Fill the Void</p>
                        </div>
                        <div className="space-y-4">
                            <input 
                                type="text" 
                                placeholder="Access ID" 
                                className="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-6 py-4 outline-none focus:border-white transition-colors"
                                onChange={e => setAuthInput({...authInput, username: e.target.value})} 
                            />
                            <input 
                                type="password" 
                                placeholder="Security Key" 
                                className="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-6 py-4 outline-none focus:border-white transition-colors"
                                onChange={e => setAuthInput({...authInput, password: e.target.value})} 
                            />
                            <button type="submit" className="w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-neutral-200 transition-colors mt-4">Initialize</button>
                        </div>
                    </form>
                </div>
            );

            if (gameState === 'setup') return (
                <div className="min-h-screen flex items-center justify-center bg-black p-6">
                    <div className="w-full max-w-md text-center animate-reveal">
                        <h1 className="logo-font text-5xl uppercase mb-12 tracking-tighter">New Game</h1>
                        <div className="space-y-4">
                            {players.map((p, i) => (
                                <div key={p.id} className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-neutral-600 uppercase">P{i+1}</span>
                                    <input 
                                        className="w-full bg-neutral-900 border border-neutral-800 rounded-xl pl-12 pr-6 py-4 font-bold focus:border-white outline-none" 
                                        value={p.name} 
                                        onChange={e => {
                                            const n = [...players]; n[i].name = e.target.value; setPlayers(n);
                                        }} 
                                    />
                                </div>
                            ))}
                            <button onClick={startGame} className="w-full bg-white text-black py-5 rounded-xl font-black text-xl uppercase mt-8 hover:scale-[1.01] active:scale-95 transition-all">Start Blanking</button>
                        </div>
                    </div>
                </div>
            );

            if (gameState === 'play') return (
                <div className="min-h-screen flex flex-col pb-32">
                    <header className="px-6 py-4 border-b border-neutral-900 flex justify-between items-center backdrop-blur-xl sticky top-0 z-50 bg-black/80">
                        <div className="logo-font text-2xl uppercase tracking-tighter">Blanked</div>
                        <div className="flex items-center gap-3">
                            <div className="bg-neutral-900 border border-neutral-800 px-3 py-1 rounded-full text-[10px] font-black">
                                {roundNumber} / {MAX_ROUNDS}
                            </div>
                            <div className="text-xs font-bold text-neutral-400">
                                {players[currentPlayerIdx].name}
                            </div>
                        </div>
                    </header>
                    <main className="p-6 md:p-12 flex flex-col items-center gap-12 max-w-7xl mx-auto w-full animate-reveal">
                        <div className="blanked-black-card rounded-3xl p-8 flex flex-col justify-between shadow-2xl border-white/5">
                            <p className="text-2xl font-bold leading-tight" dangerouslySetInnerHTML={{ __html: renderCardContent(roundBlackCard.text, "") }} />
                            <div className="flex justify-between items-end">
                                <span className="text-[10px] font-black opacity-20 uppercase tracking-widest">Blanked</span>
                                <div className="w-6 h-1 bg-white/20 rounded-full"></div>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full">
                            {players[currentPlayerIdx].hand.map((card, idx) => (
                                <button 
                                    key={idx} 
                                    onClick={() => setSelectedWhiteCard(card)} 
                                    className={`blanked-white-card p-5 text-left rounded-2xl flex flex-col justify-between group ${selectedWhiteCard === card ? 'ring-4 ring-white shadow-2xl -translate-y-2' : 'hover:-translate-y-1'}`}
                                >
                                    <span className="font-bold text-base leading-tight">{card}</span>
                                    <span className="text-[9px] font-black opacity-10 uppercase mt-4 group-hover:opacity-30 transition-opacity">Blanked</span>
                                </button>
                            ))}
                        </div>
                    </main>
                    <div className="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black/80 to-transparent flex justify-center z-50 safe-pb">
                        <button 
                            disabled={!selectedWhiteCard} 
                            onClick={submitResponse} 
                            className="w-full max-w-sm py-5 bg-white text-black font-black rounded-2xl disabled:opacity-10 uppercase text-lg shadow-2xl transition-all active:scale-95"
                        >
                            Confirm Selection
                        </button>
                    </div>
                </div>
            );

            if (gameState === 'judging') return (
                <div className="min-h-screen p-6 md:p-12 flex flex-col items-center justify-start space-y-12 animate-reveal">
                    <div className="text-center mt-8">
                        <p className="text-[10px] font-black uppercase text-neutral-500 mb-2 tracking-[0.5em]">The Verdict</p>
                        <h2 className="logo-font text-5xl uppercase tracking-tighter">Round {votingRoundIndex}</h2>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-5xl">
                        {currentVotingGroup.map(sub => (
                            <button 
                                key={sub.id} 
                                onClick={() => voteForSubmission(sub.id)} 
                                className="p-8 md:p-12 bg-neutral-900 border border-neutral-800 rounded-3xl text-left hover:border-white transition-all group shadow-xl active:scale-95"
                            >
                                <p className="text-2xl md:text-3xl font-bold leading-tight mb-8" dangerouslySetInnerHTML={{ __html: renderCardContent(sub.blackCard.text, sub.whiteCard) }} />
                                <div className="flex items-center gap-3 text-neutral-600 group-hover:text-white font-black uppercase text-[10px] tracking-widest transition-colors">
                                    Pick this combination <ArrowIcon />
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (gameState === 'winner') return (
                <div className="min-h-screen p-6 md:p-12 flex flex-col space-y-16 animate-reveal pb-32">
                    <div className="text-center flex flex-col items-center gap-6">
                        <TrophyIcon />
                        <h1 className="logo-font text-6xl uppercase tracking-tighter">The Results</h1>
                        <div className="flex flex-col md:flex-row gap-4 w-full max-w-2xl">
                            {players.map(p => (
                                <div key={p.id} className="flex-1 bg-neutral-900 border border-neutral-800 p-8 rounded-3xl flex justify-between items-center md:flex-col md:gap-2">
                                    <div className="text-[10px] font-black uppercase text-neutral-500 tracking-widest">{p.name}</div>
                                    <div className="text-5xl font-black">{p.score}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto w-full space-y-6">
                        <h2 className="text-[10px] font-black uppercase text-neutral-600 tracking-[0.6em] text-center mb-8">Game History</h2>
                        {allSubmissions.filter(s => s.winner).sort((a,b) => a.round - b.round).map(sub => (
                            <div key={sub.id} className="bg-neutral-900/40 p-8 md:p-10 rounded-3xl border border-neutral-900 flex flex-col md:flex-row items-start md:items-center gap-6 md:gap-12 animate-reveal hover:bg-neutral-900/60 transition-colors">
                                <div className="text-4xl font-black opacity-10 font-mono">0{sub.round}</div>
                                <div className="flex-1">
                                    <p className="text-xl md:text-2xl font-bold leading-tight" dangerouslySetInnerHTML={{ __html: renderCardContent(sub.blackCard.text, sub.whiteCard) }} />
                                    <div className="mt-4 text-[10px] font-black uppercase text-neutral-500 tracking-widest">
                                        Submitted by {sub.playerName}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-0 left-0 w-full flex justify-center p-6 bg-gradient-to-t from-black z-50 safe-pb">
                        <button 
                            onClick={() => setGameState('setup')} 
                            className="bg-white text-black w-full max-w-sm py-5 rounded-2xl font-black text-xl uppercase shadow-2xl hover:scale-105 active:scale-95 transition-all"
                        >
                            Reset System
                        </button>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
